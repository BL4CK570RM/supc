<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events — SUPC CSE Fest 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/events.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">SUPC CSE Fest 2026</div>
            <ul class="nav-links">
                <li><a href="/dashboard.html">Dashboard</a></li>
                <li><a href="/events.html">Events</a></li>
                <li><a href="/history.html">Payment History</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="page-heading">
            <h1>Available <em>Events</em></h1>
            <p>Select the events you want to register for and add them to your cart.</p>
        </div>

        <div class="row">
            <div>
                <div class="card">
                    <h2>All Events</h2>
                    <div id="eventsList">
                        <p>Loading events...</p>
                    </div>
                </div>
            </div>

            <div>
                <div class="cart-summary">
                    <h3>Your Cart</h3>
                    <div id="cartItems">
                        <p>No items selected</p>
                    </div>
                    <hr>
                    <p><strong>Total: ৳<span id="totalAmount">0</span></strong></p>
                    <button id="proceedPayment" class="btn btn-success">Proceed to Payment</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/events.js"></script>
</body>
</html>

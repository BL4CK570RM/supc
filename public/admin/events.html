<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events - Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">Admin Panel - Science Fest 2026</div>
            <ul class="nav-links">
                <li><a href="/admin/dashboard.html">Dashboard</a></li>
                <li><a href="/admin/events.html">Manage Events</a></li>
                <li><a href="/admin/payments.html">Verify Payments</a></li>
                <li><a href="/dashboard.html">User View</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2>Create New Event</h2>
            <form id="createEventForm">
                <div class="form-group">
                    <label for="event_name">Event Name</label>
                    <input type="text" id="event_name" name="event_name" required>
                </div>
                
                <div class="form-group">
                    <label for="event_price">Event Price (৳)</label>
                    <input type="number" id="event_price" name="event_price" step="0.01" required>
                </div>
                
                <div class="form-group">
                    <label for="event_date">Event Date</label>
                    <input type="date" id="event_date" name="event_date" required>
                </div>
                
                <div class="form-group">
                    <label for="event_time">Event Time</label>
                    <input type="time" id="event_time" name="event_time" required>
                </div>
                
                <div class="form-group">
                    <label for="event_description">Event Description</label>
                    <textarea id="event_description" name="event_description" rows="3"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">Create Event</button>
            </form>
        </div>

        <div class="card">
            <h2>Existing Events</h2>
            <div id="eventsList">
                <p>Loading events...</p>
            </div>
        </div>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/admin/admin-events.js"></script>

    <script src="/js/admin/admin-events.js"></script>
</body>
</html>

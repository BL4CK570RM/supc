<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Science Fest 2026</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">Science Fest 2026</div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/login.html">Login</a></li>
                <li><a href="/signup.html">Signup</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="card login-card">
            <h2 class="login-title">Login to Your Account</h2>
            
            <div id="alertMessage" class="login-alert-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="student_id">Student ID</label>
                    <input type="text" id="student_id" name="student_id" required placeholder="e.g., ABC123">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary login-submit-btn">Login</button>
            </form>
            
            <p class="login-signup-link">
                Don't have an account? <a href="/signup.html">Signup here</a>
            </p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
